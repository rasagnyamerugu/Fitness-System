<!DOCTYPE html>
<html lang="en">

<head>
    <title>ai agent</title>
</head>

<body>
    <h2>Talk to ai agent</h2>
    <form method="post">
        <textarea name="user_input" rows="" 5 cols="40" placeholder="ask me anything"></textarea>
        <button type="submit">send</button>
    </form>
    {% if response %}
    <h3>ai response</h3>
    <p>{{response}}</p>
    {% endif %}
</body>

</html>
